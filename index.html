<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PilotSpa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    background:#0f172a;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    text-align:center;
}

.container{
    max-width:600px;
}

h1{
    font-size:48px;
    margin-bottom:10px;
}

p{
    font-size:18px;
    opacity:0.8;
}

.badge{
    margin-top:25px;
    display:inline-block;
    padding:8px 16px;
    border:1px solid rgba(255,255,255,0.2);
    border-radius:20px;
    font-size:14px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="container">
    <h1>PilotSpa</h1>
    <p>AI-powered customer intelligence platform for salons.</p>
    <div class="badge">Currently in development</div>
</div>

</body>
</html>
